name: Publish finance-core

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Container version without v prefix
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-finance-core-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: finance-bot-platform.slnx
  PROJECT_PATH: services/finance-core/src/FinanceCore.Api/FinanceCore.Api.csproj
  TEST_PROJECT_PATH: tests/FinanceCore.Api.Tests/FinanceCore.Api.Tests.csproj
  CONTAINER_NAME: finance-bot-platform-finance-core

jobs:
  scope:
    name: Check publish scope
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.filter.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve scope
        id: filter
        shell: bash
        run: |
          previous="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [ -n "$previous" ]; then
            changed="$(git diff --name-only "$previous" "$GITHUB_SHA" -- services/finance-core libs/contracts/Finance.Application.Contracts)"
          else
            empty="$(git hash-object -t tree /dev/null)"
            changed="$(git diff --name-only "$empty" "$GITHUB_SHA" -- services/finance-core libs/contracts/Finance.Application.Contracts)"
          fi
          if [ -n "$changed" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish=false" >> "$GITHUB_OUTPUT"

  publish:
    name: Test and publish container
    needs:
      - scope
    if: needs.scope.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Lowercase owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT_PATH }} --configuration Release --no-restore

      - name: Resolve short SHA
        id: sha
        shell: bash
        run: echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          value="${{ github.event.inputs.version }}"
          if [ -z "$value" ]; then
            value="${GITHUB_REF_NAME#v}"
          fi
          project_version="$(dotnet msbuild ${{ env.PROJECT_PATH }} -target:MinVer -p:MinVerVersionOverride="$value" -getProperty:Version | tr -d '\r')"
          if [ "$project_version" != "$value" ]; then
            echo "Tag version ($value) does not match project version ($project_version)" >&2
            exit 1
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Publish container
        env:
          ContainerImageTags: ${{ steps.version.outputs.value }};sha-${{ steps.sha.outputs.value }}
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --os linux
          --arch x64
          /t:PublishContainer
          -p:MinVerVersionOverride=${{ steps.version.outputs.value }}
          -p:ContainerRegistry=ghcr.io
          -p:ContainerRepository=${{ steps.owner.outputs.value }}/${{ env.CONTAINER_NAME }}
